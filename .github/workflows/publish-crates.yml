name: publish-crates

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip-not-fail if CRATES_IO_TOKEN is missing
        id: check
        env:
          # Expose secret as env var — GitHub Actions doesn't let `if:`
          # expressions read `secrets.X` directly for security reasons.
          TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::notice::CRATES_IO_TOKEN is not set on this repo; skipping publish to crates.io. See RELEASING.md for the one-time setup."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: steps.check.outputs.should_publish == 'true'

      - name: cargo publish
        if: steps.check.outputs.should_publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish --no-verify
