name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo doc
        run: cargo doc --no-deps --release

      - name: redirect index
        run: |
          echo '<meta http-equiv="refresh" content="0; url=quant_research_framework_rs/index.html">' \
              > target/doc/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
